# Konfiguration für das Taschenfräsen (Pocketing) aus User_Drawings.gbr

# Werkzeugdurchmesser für das Freifräsen
tool-diameter=5.0mm

# Überlappung der Fräsbahnen (z.B. 0.5 = 50% des Werkzeugdurchmessers)
stepover=0.5

# Frästiefe (Z-Achse)
z-pocket=-0.1mm

# Vorschub
pocket-feed=500mm/min

# Spindeldrehzahl
spindle-speed=24000rpm