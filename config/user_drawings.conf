# Konfiguration für das Taschenfräsen (Pocketing) aus User_Drawings.gbr

# Werkzeugdurchmesser für das Freifräsen
tool-diameter=5.0mm

# Überlappung der Fräsbahnen (z.B. 0.5 = 50% des Werkzeugdurchmessers)
stepover=0.5

# Frästiefe (Z-Achse)
z-pocket=-0.1mm

# Vorschub
pocket-feed=500mm/min

# Spindeldrehzahl
spindle-speed=24000rpm

# --- Geometrie-Korrekturen ---
# Falls pcb-tools die Gerber-Einheiten falsch liest (z.B. 10x zu gross), hier anpassen:
scale=1.0
mirror-x=0
mirror-y=0
offset-x=0.0
offset-y=0.0